<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
</head>
<body>

<h1>Student Dashboard</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Attendance</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.attendance }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
